# Special topic for unmatched claims
uncategorized:
  description: "Claims that do not match any topic keywords"
  keywords: []
  priority: 99

# Topic matching settings
matching:
  # Minimum keyword matches to assign a topic (vs uncategorized)
  min_matches: 1
  
  # If multiple topics match, pick the one with:
  # - "highest_count" = most keyword matches
  # - "highest_priority" = lowest priority number
  tiebreaker: "highest_count"
  
  # Case insensitive matching
  case_sensitive: false
