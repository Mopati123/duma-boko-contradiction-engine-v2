# topics.yaml - Topic definitions for deterministic claim clustering
# 
# Each topic has a list of keywords used for matching.
# A claim is assigned to the topic with the most keyword matches.
# If no keywords match, the claim is assigned to "uncategorized".

version: "1.0"

topics:
  governance:
    description: "Government administration, public service, civil service operations"
    keywords:
      - "government"
      - "administration"
      - "public service"
      - "civil service"
      - "bureaucracy"
      - "ministry"
      - "cabinet"
      - "official"
      - "policy"
      - "governance"
      - "state"
      - "nation"
      - "country"
    priority: 1

  campaign_promises:
