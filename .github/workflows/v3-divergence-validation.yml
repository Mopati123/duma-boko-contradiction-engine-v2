name: v3 divergence validation

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate-v3-divergence-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Run v3 divergence pipeline validation
        run: |
          source .venv/bin/activate
          python test_v3_divergence_pipeline.py

      - name: Verify generated artifacts do not remain as tracked changes
        run: |
          git status --short
